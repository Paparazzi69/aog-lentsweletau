# About Section
about_us: "Ka Rona"
about_brief: "Assemblies of God Lentsweletau ke setshaba sa badumedi ba ba tletse Mowa mo motseng wa Lentsweletau, Kgaolong ya Kweneng, Botswana. Re karolo ya mokgatlho wa Assemblies of God mme re ikemiseditse go abelana lorato lwa ga Keresete le setshaba sa rona."
