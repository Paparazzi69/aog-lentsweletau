# =============================================================
# Decap CMS configuration — AOG Lentsweletau
# GitHub backend + OAuth via Cloudflare Worker
# Docs: https://decapcms.org/docs/
# =============================================================

backend:
  name: github
  repo: Paparazzi69/aog-lentsweletau
  branch: main
  # OAuth proxy Worker URL — set after deploying cf-workers/oauth-proxy.js
  base_url: https://aog-oauth.YOUR-SUBDOMAIN.workers.dev

# Publish immediately (no draft workflow for small church site)
publish_mode: simple

# Image uploads go to static/images/
media_folder: "static/images"
public_folder: "/images"

# =============================================================
# COLLECTIONS
# =============================================================
collections:

  # -----------------------------------------------------------
  # 1. SERVICE TIMES — edit Sunday / Wednesday / Friday times
  # -----------------------------------------------------------
  - name: "service_times"
    label: "⏰ Service Times"
    files:
      - name: "services"
        label: "Service Times"
        file: "data/services.yaml"
        fields:
          - label: "Sunday Worship"
            name: "sunday"
            widget: "object"
            fields:
              - { label: "Name (English)", name: "name_en", widget: "string", default: "Sunday Worship" }
              - { label: "Name (Setswana)", name: "name_tn", widget: "string", default: "Tirelo ya Sontaga" }
              - { label: "Day (English)", name: "day_en", widget: "string", default: "Sunday" }
              - { label: "Day (Setswana)", name: "day_tn", widget: "string", default: "Sontaga" }
              - { label: "Time", name: "time", widget: "string", default: "10:00 AM" }
              - { label: "Location (English)", name: "location_en", widget: "string", default: "Main Church Building" }
              - { label: "Location (Setswana)", name: "location_tn", widget: "string", default: "Kago ya Kereke" }

          - label: "Midweek Service (Wednesday)"
            name: "wednesday"
            widget: "object"
            fields:
              - { label: "Name (English)", name: "name_en", widget: "string", default: "Midweek Service" }
              - { label: "Name (Setswana)", name: "name_tn", widget: "string", default: "Tirelo ya Gare ga Beke" }
              - { label: "Day (English)", name: "day_en", widget: "string", default: "Wednesday" }
              - { label: "Day (Setswana)", name: "day_tn", widget: "string", default: "Laboraro" }
              - { label: "Time", name: "time", widget: "string", default: "6:00 PM" }
              - { label: "Location (English)", name: "location_en", widget: "string", default: "Main Church Building" }
              - { label: "Location (Setswana)", name: "location_tn", widget: "string", default: "Kago ya Kereke" }

          - label: "Youth Service (Friday)"
            name: "friday"
            widget: "object"
            fields:
              - { label: "Name (English)", name: "name_en", widget: "string", default: "Youth Service" }
              - { label: "Name (Setswana)", name: "name_tn", widget: "string", default: "Tirelo ya Banana" }
              - { label: "Day (English)", name: "day_en", widget: "string", default: "Friday" }
              - { label: "Day (Setswana)", name: "day_tn", widget: "string", default: "Labotlhano" }
              - { label: "Time", name: "time", widget: "string", default: "5:00 PM" }
              - { label: "Location (English)", name: "location_en", widget: "string", default: "Main Church Building" }
              - { label: "Location (Setswana)", name: "location_tn", widget: "string", default: "Kago ya Kereke" }

  # -----------------------------------------------------------
  # 2. EVENTS — English (add/edit/remove individual events)
  # -----------------------------------------------------------
  - name: "en_events"
    label: "📅 Events (English)"
    files:
      - name: "events_en"
        label: "Events Page"
        file: "content/en/events.md"
        fields:
          - { label: "Page Title", name: "title", widget: "string" }
          - { label: "Subtitle", name: "subtitle", widget: "string" }

          - label: "Regular Services"
            name: "regular_services"
            widget: "list"
            label_singular: "Service"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Schedule (e.g. Every Sunday)", name: "schedule", widget: "string" }
              - { label: "Time", name: "time", widget: "string" }
              - { label: "Location", name: "location", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }

          - label: "Special Events"
            name: "special_events"
            widget: "list"
            label_singular: "Event"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Schedule / Date", name: "schedule", widget: "string" }
              - { label: "Time", name: "time", widget: "string" }
              - { label: "Location", name: "location", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }

  # -----------------------------------------------------------
  # 3. EVENTS — Setswana
  # -----------------------------------------------------------
  - name: "tn_events"
    label: "📅 Diketsahalo (Setswana)"
    files:
      - name: "events_tn"
        label: "Diketsahalo Page"
        file: "content/tn/events.md"
        fields:
          - { label: "Leina la Letlhakore", name: "title", widget: "string" }
          - { label: "Subtitle", name: "subtitle", widget: "string" }

          - label: "Ditirelo tsa Tlwaelo (Regular Services)"
            name: "regular_services"
            widget: "list"
            label_singular: "Tirelo"
            fields:
              - { label: "Leina (Title)", name: "title", widget: "string" }
              - { label: "Nako e e Tlwaelegileng (Schedule)", name: "schedule", widget: "string" }
              - { label: "Nako (Time)", name: "time", widget: "string" }
              - { label: "Lefelo (Location)", name: "location", widget: "string" }
              - { label: "Tlhaloso (Description)", name: "description", widget: "text" }

          - label: "Diketsahalo tse di Kgethegileng (Special Events)"
            name: "special_events"
            widget: "list"
            label_singular: "Ketsahalo"
            fields:
              - { label: "Leina (Title)", name: "title", widget: "string" }
              - { label: "Letsatsi / Nako e e Tlwaelegileng", name: "schedule", widget: "string" }
              - { label: "Nako (Time)", name: "time", widget: "string" }
              - { label: "Lefelo (Location)", name: "location", widget: "string" }
              - { label: "Tlhaloso (Description)", name: "description", widget: "text" }

  # -----------------------------------------------------------
  # 4. ENGLISH PAGES — About, Gallery, Give
  # -----------------------------------------------------------
  - name: "en_pages"
    label: "📄 Pages (English)"
    files:
      - name: "about_en"
        label: "About Page"
        file: "content/en/about.md"
        fields:
          - { label: "Page Title", name: "title", widget: "string" }
          - { label: "Subtitle", name: "subtitle", widget: "string" }
          - { label: "SEO Description", name: "description", widget: "string" }
          - { label: "Content", name: "body", widget: "markdown" }

      - name: "gallery_en"
        label: "Gallery Page"
        file: "content/en/gallery.md"
        fields:
          - { label: "Page Title", name: "title", widget: "string" }
          - { label: "Subtitle", name: "subtitle", widget: "string" }
          - { label: "SEO Description", name: "description", widget: "string" }
          - { label: "Content", name: "body", widget: "markdown" }

      - name: "give_en"
        label: "Give / Contact Page"
        file: "content/en/give.md"
        fields:
          - { label: "Page Title", name: "title", widget: "string" }
          - { label: "Subtitle", name: "subtitle", widget: "string" }
          - { label: "SEO Description", name: "description", widget: "string" }
          - { label: "Content", name: "body", widget: "markdown" }

  # -----------------------------------------------------------
  # 5. SETSWANA PAGES — Ka Rona, Ditshwantsho, Neela
  # -----------------------------------------------------------
  - name: "tn_pages"
    label: "📄 Matlhakore a Setswana"
    files:
      - name: "about_tn"
        label: "Ka Rona (About)"
        file: "content/tn/about.md"
        fields:
          - { label: "Leina la Letlhakore", name: "title", widget: "string" }
          - { label: "Subtitle", name: "subtitle", widget: "string" }
          - { label: "Tlhaloso ya SEO", name: "description", widget: "string" }
          - { label: "Diteng (Content)", name: "body", widget: "markdown" }

      - name: "gallery_tn"
        label: "Ditshwantsho (Gallery)"
        file: "content/tn/gallery.md"
        fields:
          - { label: "Leina la Letlhakore", name: "title", widget: "string" }
          - { label: "Subtitle", name: "subtitle", widget: "string" }
          - { label: "Tlhaloso ya SEO", name: "description", widget: "string" }
          - { label: "Diteng (Content)", name: "body", widget: "markdown" }

      - name: "give_tn"
        label: "Neela (Give / Contact)"
        file: "content/tn/give.md"
        fields:
          - { label: "Leina la Letlhakore", name: "title", widget: "string" }
          - { label: "Subtitle", name: "subtitle", widget: "string" }
          - { label: "Tlhaloso ya SEO", name: "description", widget: "string" }
          - { label: "Diteng (Content)", name: "body", widget: "markdown" }

  # -----------------------------------------------------------
  # 6. GALLERY IMAGES — upload + manage photos
  # -----------------------------------------------------------
  - name: "gallery_images"
    label: "🖼️ Gallery Images"
    label_singular: "Image"
    folder: "static/images/gallery"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Image Title", name: "title", widget: "string" }
      - { label: "Photo", name: "image", widget: "image" }
      - { label: "Alt Text (describe for accessibility)", name: "alt", widget: "string" }
      - label: "Category"
        name: "category"
        widget: "select"
        options:
          - { label: "Worship Service", value: "worship" }
          - { label: "Choir", value: "choir" }
          - { label: "Youth", value: "youth" }
          - { label: "Community Outreach", value: "outreach" }
          - { label: "Church Building", value: "building" }
          - { label: "Other", value: "other" }
