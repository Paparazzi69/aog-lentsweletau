{{- /*
  Floating time-of-day palette switcher.
  Collapsed: a single sun/moon pill; expands to a menu on click.
  Labels from i18n (en/tn).
*/ -}}
<div class="aog-palette-switch" data-open="false">
  <button type="button" class="aog-palette-toggle"
          aria-haspopup="true" aria-expanded="false"
          aria-label="{{ i18n "palette_label" }}">
    <svg class="aog-palette-icon" viewBox="0 0 24 24" width="18" height="18"
         fill="none" stroke="currentColor" stroke-width="1.8"
         stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <circle cx="12" cy="12" r="4"/>
      <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
    </svg>
  </button>
  <div class="aog-palette-menu" role="menu" aria-label="{{ i18n "palette_label" }}">
    <button type="button" role="menuitemradio" data-palette="auto"   aria-checked="false">{{ i18n "palette_auto" }}</button>
    <button type="button" role="menuitemradio" data-palette="dawn"   aria-checked="false">{{ i18n "palette_dawn" }}</button>
    <button type="button" role="menuitemradio" data-palette="day"    aria-checked="true">{{ i18n "palette_day" }}</button>
    <button type="button" role="menuitemradio" data-palette="sunset" aria-checked="false">{{ i18n "palette_sunset" }}</button>
    <button type="button" role="menuitemradio" data-palette="night"  aria-checked="false">{{ i18n "palette_night" }}</button>
  </div>
</div>
