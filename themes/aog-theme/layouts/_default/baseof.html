<!DOCTYPE html>
<html lang="{{ .Lang }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if .IsHome }}{{ i18n "site_title" }}{{ else }}{{ .Title }} — {{ i18n "site_title" }}{{ end }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Language.Params.description }}{{ end }}">

  <!-- Canonical -->
  <link rel="canonical" href="{{ .Permalink }}">

  <!-- Hreflang for bilingual EN/TN -->
  {{ range .Translations }}
  <link rel="alternate" hreflang="{{ .Lang }}" href="{{ .Permalink }}">
  {{ end }}
  <link rel="alternate" hreflang="{{ .Lang }}" href="{{ .Permalink }}">
  <link rel="alternate" hreflang="x-default" href="{{ .Site.BaseURL }}en/">

  <!-- Open Graph -->
  <meta property="og:title" content="{{ if .IsHome }}{{ i18n "site_title" }}{{ else }}{{ .Title }} — {{ i18n "site_title" }}{{ end }}">
  <meta property="og:description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Language.Params.description }}{{ end }}">
  <meta property="og:type" content="{{ if .IsHome }}website{{ else }}article{{ end }}">
  <meta property="og:url" content="{{ .Permalink }}">
  <meta property="og:site_name" content="{{ i18n "site_title" }}">
  <meta property="og:image" content="{{ .Site.BaseURL }}images/church-community.jpg">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="800">

  <!-- Favicon -->
  <link rel="icon" href="/images/favicon.svg" type="image/svg+xml">
  <link rel="icon" href="/images/favicon.ico" type="image/x-icon" sizes="any">

  <!-- Fonts (Fraunces is used by the pinned story; Google Fonts handles fallback) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300..700&display=swap">

  <!-- CSS -->
  <link rel="stylesheet" href="/css/palette.css">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/lightbox.css">

  <!-- Schema.org Church markup -->
  {{ if .IsHome }}
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Church",
    "name": "Assemblies of God Lentsweletau",
    "alternateName": "AOG Lentsweletau",
    "description": "Spirit-filled Pentecostal church in Lentsweletau Village, Kweneng District, Botswana. Sunday worship 9:30 AM, Wednesday service 6:00 PM, Youth service Friday 5:00 PM.",
    "url": "{{ .Site.BaseURL }}",
    "telephone": "{{ .Site.Params.phone }}",
    "image": "{{ .Site.BaseURL }}images/church-community.jpg",
    "address": {
      "@type": "PostalAddress",
      "streetAddress": "Lentsweletau Village",
      "addressLocality": "Lentsweletau",
      "addressRegion": "Kweneng District",
      "addressCountry": "BW"
    },
    "geo": {
      "@type": "GeoCoordinates",
      "latitude": -24.37,
      "longitude": 25.82
    },
    "openingHoursSpecification": [
      {
        "@type": "OpeningHoursSpecification",
        "dayOfWeek": "Sunday",
        "opens": "09:30",
        "closes": "12:00",
        "name": "Sunday Worship Service"
      },
      {
        "@type": "OpeningHoursSpecification",
        "dayOfWeek": "Wednesday",
        "opens": "18:00",
        "closes": "20:00",
        "name": "Midweek Service"
      },
      {
        "@type": "OpeningHoursSpecification",
        "dayOfWeek": "Friday",
        "opens": "17:00",
        "closes": "19:00",
        "name": "Youth Service"
      }
    ],
    "sameAs": [
      "{{ .Site.Params.facebook }}",
      "https://ag.org"
    ],
    "parentOrganization": {
      "@type": "Organization",
      "name": "Assemblies of God",
      "url": "https://ag.org"
    },
    "hasMap": "https://maps.google.com/?q=Lentsweletau+Village,+Kweneng+District,+Botswana"
  }
  </script>
  {{ end }}
</head>
<body>
  <div class="aog-scroll-progress" aria-hidden="true"></div>
  {{ partial "header.html" . }}

  <main id="content">
    {{ block "main" . }}{{ end }}
  </main>

  {{ partial "footer.html" . }}
  {{ partial "whatsapp-button.html" . }}
  <script src="/js/lightbox.js"></script>
  <script type="module" src="/js/site.js"></script>
</body>
</html>
