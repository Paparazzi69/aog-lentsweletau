{{ define "main" }}
<article class="page-content">
  <section class="page-hero">
    <div class="container">
      <h1>{{ .Title }}</h1>
      {{ with .Params.subtitle }}<p class="page-subtitle">{{ . }}</p>{{ end }}
    </div>
  </section>
  <section class="section">
    <div class="container content-body">
      {{ .Content }}
    </div>
  </section>
</article>
{{ end }}
